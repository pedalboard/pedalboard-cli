    buttons:
      A: { label: "Clean", program_change: 0, color: green, radio_group: 1, on_long_press: prev_preset }
      F: { label: "Next", cc: 82, color: white, on_long_press: next_preset }
    defaults:
      buttons: { A: "on" }

  - name: "Song 7"
    audio_snapshot: "Clean"
    buttons:
      A: { label: "Clean", program_change: 0, color: green, radio_group: 1, on_long_press: prev_preset }
      F: { label: "Next", cc: 82, color: white, on_long_press: next_preset }
    defaults:
      buttons: { A: "on" }

