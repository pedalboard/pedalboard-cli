global:
  din_enabled: true
  din_to_usb_thru: true
  usb_to_din_thru: false
  midi_clock: false
  bpm: 120
  calibration:
    exp1:
      min: 180
      max: 3700
    exp2:
      min: 200
      max: 3750

presets:
  # Mode 1: Live Effect (Plethora board switching + pedalboard-audio bypass)
  - name: "Live FX"
    buttons:
      A:
        label: "Board 1"
        program_change: 0
        channel: 2
        color: blue
        radio_group: 1
      B:
        label: "Board 2"
        program_change: 1
        channel: 2
        color: '#2E8B57'
        radio_group: 1
      C:
        label: "Board 3"
        program_change: 2
        channel: 2
        color: green
        radio_group: 1
      D:
        # Toggle bypass — blinks red when bypassed (needs attention)
        label: "Bypass"
        cc: 0
        channel: 3
        toggle: true
        color: red
        animation: blink
        on_long_press: prev_preset
      E:
        label: ""
        color: off
      F:
        label: "Board 4"
        program_change: 3
        channel: 2
        color: '#EE82EE'
        radio_group: 1
        on_long_press: next_preset
    encoders:
      Vol:
        label: "HotKnob1"
        cc: 107
        channel: 2
      Gain:
        label: "HotKnob2"
        cc: 108
        channel: 2
    analog:
      Exp1:
        label: "Volume"
        cc: 7

  # Mode 2: Live Looper (RC-500 control)
  - name: "Looper"
    buttons:
      A:
        # Rhythm toggle — pulses blue when active (background activity)
        label: "Rhythm"
        cc: 4
        toggle: true
        color: blue
        animation: pulse
      B:
        label: "Variat."
        cc: 5
        color: blue
      C:
        label: ""
        color: off
      D:
        label: "Mem+"
        cc: 1
        color: red
        on_long_press: prev_preset
      E:
        label: "Mem-"
        cc: 2
        color: red
      F:
        # Clear: action sequence
        label: "Clear"
        color: red
        animation: blink
        on_long_press: next_preset
        actions:
          - cc: 3
            value: 127
          - delay: 50
          - cc: 3
            value: 0
    encoders:
      Vol:
        label: "Vol"
        cc: 7
      Gain:
        label: "Level"
        cc: 6
    analog:
      Exp1:
        label: "Volume"
        cc: 7

  # Mode 3: Setup Looper (RC-500 drum kit & pattern selection)
  - name: "Setup RC"
    buttons:
      A:
        label: "Pat+"
        cc: 7
        values: [0, 2, 4, 6, 8, 11, 13, 15, 17, 19, 22, 24]
        color: cyan
        renderer: single
        renderer_param: 0
      B:
        label: "Pat-"
        cc: 7
        values: [0, 2, 4, 6, 8, 11, 13, 15, 17, 19, 22, 24]
        reverse: true
        color: cyan
        renderer: single
        renderer_param: 6
      C:
        label: ""
        color: off
      D:
        label: "Kit+"
        cc: 8
        values: [0, 8, 17, 26, 35, 43, 51, 59, 68, 76, 85]
        color: yellow
        renderer: single
        renderer_param: 0
        on_long_press: prev_preset
      E:
        label: "Kit-"
        cc: 8
        values: [0, 8, 17, 26, 35, 43, 51, 59, 68, 76, 85]
        reverse: true
        color: yellow
        renderer: single
        renderer_param: 6
      F:
        label: ""
        color: off
        on_long_press: next_preset
    encoders:
      Vol:
        label: "Vol"
        cc: 7
      Gain:
        label: "Level"
        cc: 6
    analog:
      Exp1:
        label: "Volume"
        cc: 7
