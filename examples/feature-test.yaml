# Feature test preset: exercises all button modes, action types, encoders, analog,
# defaults, on_enter, and LED renderers/animations. Used by integration.sh to verify
# the full PE upload → persist → read-back → content verification pipeline.
#
# Preset 0: All button modes (momentary, toggle, cycle, PC, long-press), defaults,
#            on_enter PC, encoders, and expression pedals.
# Preset 1: LED renderers (dots, single, fill) and animations (rotate, blink, pulse, colorcycle).
# Preset 2: CC cycle forward/reverse, note on, program change — verifies cycle state.

global:
  din_enabled: true
  din_to_usb_thru: true
  midi_clock: true
  bpm: 120

presets:
  - name: "Feature Test"
    # Initial state: Toggle B starts ON, Vol at 100
    defaults:
      buttons: { B: "on" }
      encoders: { Vol: 100 }
    # Send PC 0 on channel 2 when entering this preset (e.g. select multi-effect patch)
    on_enter:
      - { program_change: 0, channel: 2 }
    buttons:
      # A: Momentary NoteOn/Off — LED green while pressed
      A: { label: "Note", note: 60, color: green }
      # B: Toggle CC — LED blue blinks when on
      B: { label: "Toggle", cc: 80, toggle: true, color: blue, animation: blink }
      # C: CcCycle — pulses cyan when active
      C: { label: "Kit+", cc: 8, values: [0, 8, 17, 26, 35, 43, 51], color: cyan, animation: pulse }
      # D: Normal CC + long-press prev preset — LED yellow while pressed
      D: { label: "FX1", cc: 20, value: 127, color: yellow, on_long_press: prev_preset }
      # E: Program Change — solid magenta
      E: { label: "PC 3", program_change: 3, color: magenta }
      # F: Normal CC + long-press next preset — LED red blinks when active
      F: { label: "FX2", cc: 21, value: 127, color: red, animation: blink, on_long_press: next_preset }
    encoders:
      # Vol: CC#7 (standard volume)
      Vol: { label: "Vol", cc: 7 }
      # Gain: CC#91 (reverb send)
      Gain: { label: "Reverb", cc: 91 }
    analog:
      Exp1: { label: "Wah", cc: 11 }
      Exp2: { label: "Volume", cc: 7 }

  - name: "LED Animations"
    buttons:
      # A: Dots (3 evenly-spaced red dots) + Rotate
      A: { label: "Dots", cc: 80, toggle: true, color: red, renderer: dots, renderer_param: 3, animation: rotate }
      # B: Single blue dot + Blink
      B: { label: "Single", cc: 81, toggle: true, color: blue, renderer: single, renderer_param: 0, animation: blink }
      # C: Color cycle (hue rotation over time, all 12 LEDs)
      C: { label: "Colors", cc: 82, toggle: true, color: green, animation: colorcycle }
      # D: Fill (6 LEDs arc) yellow
      D: { label: "Fill", cc: 83, toggle: true, color: yellow, renderer: fill, renderer_param: 6, on_long_press: prev_preset }
      # E: Dots (2 opposing cyan dots) + Pulse
      E: { label: "Dots2", cc: 84, toggle: true, color: cyan, renderer: dots, renderer_param: 2, animation: pulse }
      # F: Solid magenta + Blink (classic)
      F: { label: "Blink", cc: 85, toggle: true, color: magenta, animation: blink, on_long_press: next_preset }
    encoders:
      Vol: { label: "Vol", cc: 7 }
      Gain: { label: "Gain", cc: 11 }

  - name: "Cycle Test"
    buttons:
      A: { label: "Kit+", cc: 8, values: [0, 8, 17, 26, 35, 43, 51, 59, 68, 76, 85], color: green }
      B: { label: "Kit-", cc: 8, values: [0, 8, 17, 26, 35, 43, 51, 59, 68, 76, 85], reverse: true, color: red }
      C: { label: "Note", note: 64, color: blue }
      D: { label: "Prev", cc: 99, color: yellow, on_long_press: prev_preset }
      E: { label: "PC 0", program_change: 0, color: cyan }
      F: { label: "Next", cc: 100, color: magenta, on_long_press: next_preset }
    encoders:
      # Relative CC mode (sends fixed inc/dec values)
      Vol: { label: "FX Knob", mode: relative, cc: 16, channel: 1, increment: 65, decrement: 63 }
      # Preset scroll mode (no MIDI, scrolls presets)
      Gain: { label: "Bank", mode: preset_scroll }

  - name: "Clock Test"
    bpm: 140
    buttons:
      A: { label: "Start", clock_start: true, color: green }
      B: { label: "Stop", clock_stop: true, color: red }
      C: { label: "Toggle", clock_toggle: true, color: orange }
      D: { label: "Tap", tap_tempo: true, color: cyan }
      E: { label: "CC", cc: 50, color: blue }
      F: { label: "Next", cc: 100, color: magenta, on_long_press: clock_toggle }
    encoders:
      Vol: { label: "Tempo", mode: preset_scroll }
      Gain: { label: "Mix", cc: 91 }
