# Replicates the original 3-mode pedalboard configuration
# RC-500: channel 1, Plethora: channel 2
presets:
  - name: "Live FX"
    buttons:
      A: { label: "Board+", cc: 95, value: 127, channel: 2, color: green }
      B: { label: "Board-", cc: 94, value: 127, channel: 2, color: green }
      D: { label: "Board+", cc: 95, value: 127, channel: 2, color: blue }
      E: { label: "Board-", cc: 94, value: 127, channel: 2, color: blue }
    encoders:
      Vol: { label: "Vol", cc: 7 }
      Gain: { label: "Gain", cc: 1 }

  - name: "Looper"
    buttons:
      A: { label: "Rhythm", cc: 80, toggle: true, channel: 1, color: green }
      B: { label: "Vari", cc: 81, value: 127, channel: 1, color: blue }
      D: { label: "Mem+", cc: 82, value: 127, channel: 1, color: yellow }
      E: { label: "Mem-", cc: 83, value: 127, channel: 1, color: yellow }
      F: { label: "Clear", cc: 84, value: 127, channel: 1, color: red }
    encoders:
      Vol: { label: "Level", cc: 6, channel: 1 }
      Gain: { label: "Gain", cc: 1 }

  - name: "Setup"
    buttons:
      A: { label: "Pat+", cc: 7, value: 127, channel: 1, color: magenta }
      B: { label: "Pat-", cc: 7, value: 0, channel: 1, color: magenta }
      D: { label: "Kit+", cc: 8, value: 127, channel: 1, color: cyan }
      E: { label: "Kit-", cc: 8, value: 0, channel: 1, color: cyan }
    encoders:
      Vol: { label: "Vol", cc: 7 }
      Gain: { label: "Gain", cc: 1 }
